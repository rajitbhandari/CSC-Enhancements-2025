<template>
    <template if:true={articlesIdentified}>
        <template if:true={showKeyArticle}>
            <h2 style="margin-left: 9px; margin-top: 10px; font-size: 12pt;">Key Articles</h2>
            <template for:each={articlesIdentified} for:item="parentTopic">
                <template for:each={parentTopic.PriorityArticlesForTheTopic} for:item="article">
                    <div key={article.Id}>
                        <c-custom-article-individual-row knowledge-object={article}></c-custom-article-individual-row>
                    </div>
                </template>
            </template>
        </template>
        <!-- Clickable list for modal popup -->
        <div>
            <template for:each={articlesIdentified} for:item="parentTopic">
                <div key={parentTopic.TopicId} class="slds-p-vertical_x-small">
                    <a href="javascript:void(0);"
                       class="parent-topic-link"
                       data-topic-id={parentTopic.TopicId}
                       data-topic-name={parentTopic.TopicName}
                       onclick={handleTopicClick}>
                        {parentTopic.TopicName}
                    </a>
                </div>
                <template for:each={parentTopic.childTopicsAssociated} for:item="childTopic">
                    <div key={childTopic.TopicId} class="slds-p-left_xx-large slds-p-vertical_x-small">
                        <a href="javascript:void(0);"
                           class="child-topic-link"
                           data-topic-id={childTopic.TopicId}
                           data-topic-name={childTopic.TopicName}
                           onclick={handleChildTopicClick}>
                            {childTopic.TopicName}
                        </a>
                    </div>
                </template>
            </template>
        </div>
        <!-- Modal markup for subcomponents/articles -->
        <template if:true={showModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title">{modalTopicName}</h2>
                        <template if:true={modalArticles.length}>
                            <div class="slds-text-body_small slds-m-top_x-small" style="font-weight:bold;">{modalArticles.length} Articles</div>
                        </template>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- Sort and Search Controls at the Top -->
                        <div class="slds-grid slds-gutters slds-p-bottom_small">
                            <div class="slds-col">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="sortSelect">Sort by</label>
                                    <div class="slds-form-element__control">
                                        <select class="slds-select" id="sortSelect" onchange={handleSortChange}>
                                            <option value="title">Title</option>
                                            <option value="date">Date</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="searchInput">Search</label>
                                    <div class="slds-form-element__control slds-grid">
                                        <input type="text" id="searchInput" class="slds-input" oninput={handleSearchInput} placeholder="Search articles..." />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Article List -->
                        <template if:true={modalArticles.length}>
                            <template for:each={modalArticles} for:item="article">
                                <div key={article.Id} class="slds-p-vertical_x-small">
                                    <a href={article.urlToRecirect} target="_blank" class="article-title-link">
                                       <c-custom-article-individual-row knowledge-object={article}></c-custom-article-individual-row>
                                    </a>
                                    <div class="article-meta slds-text-color_weak slds-text-body_small">
                                        <span>
                                            {article.dateAdded}
                                        </span>
                                        <template if:true={article.NumberOfViews}>
                                            <span style="vertical-align:middle; font-size:1.1em; padding: 0 0.5em;">&#8226;</span>
                                            <span>Views: {article.NumberOfViews}</span>
                                        </template>
                                    </div>
                                    <div class="slds-border_bottom slds-m-vertical_small"></div>
                                </div>
                            </template>
                        <template if:false={modalArticles.length}>
                            <div class="slds-text-color_weak slds-p-vertical_medium slds-align_absolute-center">
                                No articles found.
                            </div>
                        </template>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral my-close-btn" onclick={handleCloseModal}>Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>
</template>
